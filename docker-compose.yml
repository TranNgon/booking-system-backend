version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: booking_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_system
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - booking_network
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: booking_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - booking_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  booking_network:
    driver: bridge
